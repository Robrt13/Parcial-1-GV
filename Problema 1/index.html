<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sistema Solar</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
    // ============================================================
    // CONFIGURACIÓN BASE
    // ============================================================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============================================================
    // PARTE A — ESCENA BASE Y OBJETOS
    // ============================================================

    // A.1 - Sol central
    const solGeometria = new THREE.SphereGeometry(4, 32, 32);
    const solMaterial = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    const sol = new THREE.Mesh(solGeometria, solMaterial);
    scene.add(sol);

    const luzSol = new THREE.PointLight(0xfbff8f, 75, 300);
    luzSol.position.set(0, 0, 0);
    scene.add(luzSol);

    const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(luzAmbiente);

    // A.2 - Planetas con materiales diferenciados
    const loader = new THREE.TextureLoader();

    const texturaP1 = loader.load(
        'https://assets.science.nasa.gov/content/dam/science/cds/3d/resources/image/jupiter---callisto/Jupiter%20-%20Callisto.jpg'
    );

    const planeta1 = new THREE.Mesh(
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.MeshStandardMaterial({
            map: texturaP1,
            roughness: 0.8,
            metalness: 0.1
        })
    );

    const planeta2 = new THREE.Mesh(
        new THREE.SphereGeometry(2.2, 32, 32),
        new THREE.MeshStandardMaterial({
            color: 0xbf3813,
            roughness: 0.4,
            metalness: 0.5
        })
    );

    const anillo2 = new THREE.Mesh(
        new THREE.TorusGeometry(2.5, 0.3, 8, 60),
        new THREE.MeshStandardMaterial({ color: 0xc8a870 })
    );
    anillo2.rotation.x = Math.PI / 2.5;

    const planeta3 = new THREE.Mesh(
        new THREE.SphereGeometry(2.8, 32, 32),
        new THREE.MeshPhongMaterial({
            color: 0x112b96,
            shininess: 120
        })
    );

    // A.3 - Lunas con grupos anidados

    // Planeta 1
    const grupoPlaneta1 = new THREE.Group();
    grupoPlaneta1.add(planeta1);
    scene.add(grupoPlaneta1);

    planeta1.position.x = 12;

    const luna1 = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
    );
    luna1.position.x = 2;

    const grupoLuna1 = new THREE.Group();
    grupoLuna1.position.x = 12;
    grupoLuna1.add(luna1);
    grupoPlaneta1.add(grupoLuna1);

    // Planeta 2
    const grupoPlaneta2 = new THREE.Group();
    planeta2.add(anillo2);
    grupoPlaneta2.add(planeta2);
    scene.add(grupoPlaneta2);

    planeta2.position.x = 18;

    const luna2 = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x998877 })
    );
    luna2.position.x = 4.5;

    const grupoLuna2 = new THREE.Group();
    grupoLuna2.position.x = 18;
    grupoLuna2.add(luna2);
    grupoPlaneta2.add(grupoLuna2);

    // Planeta 3
    const grupoPlaneta3 = new THREE.Group();
    grupoPlaneta3.add(planeta3);
    scene.add(grupoPlaneta3);

    planeta3.position.x = 30;

    const luna3 = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0x777777 })
    );
    luna3.position.x = 6;

    const grupoLuna3 = new THREE.Group();
    grupoLuna3.position.x = 30;
    grupoLuna3.add(luna3);
    grupoPlaneta3.add(grupoLuna3);

    // ============================================================
    // PARTE B — EFECTOS VISUALES
    // ============================================================

    // B.1 - Fondo estelar con Points
    const cantidadEstrellas = 5000;
    const posicionesEstrellas = new Float32Array(cantidadEstrellas * 3);

    for (let i = 0; i < cantidadEstrellas; i++) {
        const u = Math.random();
        const v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        const radio = 300 + Math.random() * 200;

        posicionesEstrellas[i * 3] = radio * Math.sin(phi) * Math.cos(theta);
        posicionesEstrellas[i * 3 + 1] = radio * Math.sin(phi) * Math.sin(theta);
        posicionesEstrellas[i * 3 + 2] = radio * Math.cos(phi);
    }

    const geometriaEstrellas = new THREE.BufferGeometry();
    geometriaEstrellas.setAttribute(
        'position',
        new THREE.BufferAttribute(posicionesEstrellas, 3)
    );

    const materialEstrellas = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.7,
        sizeAttenuation: true
    });

    const estrellas = new THREE.Points(geometriaEstrellas, materialEstrellas);
    scene.add(estrellas);

    // B.2 - Cinturón de asteroides entre planeta 2 y planeta 3
    const cantidadAsteroides = 2500;
    const posicionesAsteroides = new Float32Array(cantidadAsteroides * 3);

    const radioInterno = 21;
    const radioExterno = 27;

    for (let i = 0; i < cantidadAsteroides; i++) {
        const angulo = Math.random() * Math.PI * 2;
        const radio = radioInterno + Math.random() * (radioExterno - radioInterno);

        posicionesAsteroides[i * 3] = Math.cos(angulo) * radio;
        posicionesAsteroides[i * 3 + 1] = (Math.random() - 0.5) * 1.2;
        posicionesAsteroides[i * 3 + 2] = Math.sin(angulo) * radio;
    }

    const geometriaAsteroides = new THREE.BufferGeometry();
    geometriaAsteroides.setAttribute(
        'position',
        new THREE.BufferAttribute(posicionesAsteroides, 3)
    );

    const materialAsteroides = new THREE.PointsMaterial({
        color: 0xaaaaaa,
        size: 0.25,
        sizeAttenuation: true
    });

    const cinturonAsteroides = new THREE.Points(
        geometriaAsteroides,
        materialAsteroides
    );
    scene.add(cinturonAsteroides);

    // B.3 - Líneas de órbita
    function crearOrbita(radio) {
        const curva = new THREE.EllipseCurve(
            0, 0,
            radio, radio,
            0, 2 * Math.PI,
            false,
            0
        );

        const puntos = curva.getPoints(128);
        const geometria = new THREE.BufferGeometry().setFromPoints(puntos);

        const material = new THREE.LineBasicMaterial({
            color: 0x555555,
            transparent: true,
            opacity: 0.35
        });

        const linea = new THREE.Line(geometria, material);
        linea.rotation.x = Math.PI / 2;
        return linea;
    }

    scene.add(crearOrbita(12));
    scene.add(crearOrbita(18));
    scene.add(crearOrbita(30));

    // B.4 - Iluminación ambiente
    // Cumplido con luzAmbiente = new THREE.AmbientLight(0xffffff, 0.15)

    // ============================================================
    // ANIMACIÓN
    // ============================================================
    const velocidades = {
        sol: 0.002,
        p1: 0.026,
        p2: 0.015,
        p3: 0.008,
        l1: 0.04,
        l2: 0.03,
        l3: 0.02
    };

    const velCinturon = 0.0008;
    const velEstrellas = 0.0002;

    function animar() {
        requestAnimationFrame(animar);

        sol.rotation.y += velocidades.sol;

        grupoPlaneta1.rotation.y += velocidades.p1;
        grupoPlaneta2.rotation.y += velocidades.p2;
        grupoPlaneta3.rotation.y += velocidades.p3;

        grupoLuna1.rotation.y += velocidades.l1;
        grupoLuna2.rotation.y += velocidades.l2;
        grupoLuna3.rotation.y += velocidades.l3;

        cinturonAsteroides.rotation.y += velCinturon;
        estrellas.rotation.y += velEstrellas;

        renderer.render(scene, camera);
    }

    animar();
</script>
</body>
</html>
